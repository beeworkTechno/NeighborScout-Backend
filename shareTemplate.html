<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Business Share Preview</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f7f7; color: #1f2937; margin: 0; padding: 0; }
    .page { max-width: 640px; margin: 0 auto; padding: 32px; }
    .card { background: #ffffff; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); padding: 32px; }
    .title { margin: 0 0 12px; font-size: 32px; font-weight: 800; line-height: 1.1; }
    .subtitle { margin: 0 0 24px; color: #4b5563; font-size: 16px; line-height: 1.6; }
    .label { display: block; margin-bottom: 8px; font-size: 13px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.12em; }
    .value { margin: 0 0 24px; font-size: 18px; line-height: 1.6; color: #111827; }
    .button-row { display: grid; gap: 14px; }
    .button { text-decoration: none; display: inline-flex; align-items: center; justify-content: center; padding: 14px 20px; border-radius: 16px; font-size: 16px; font-weight: 700; }
    .button-primary { background: #f9b208; color: #111827; }
    .button-secondary { background: #111827; color: #ffffff; }
    .footer { margin-top: 28px; color: #6b7280; font-size: 14px; line-height: 1.7; }
    .meta { background: #f3f4f6; padding: 18px; border-radius: 16px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1 class="title">%BUSINESS_NAME%</h1>
      <p class="subtitle">Shareable preview for your business link.</p>

      <div class="meta">
        <span class="label">Address</span>
        <p class="value">%BUSINESS_ADDRESS%</p>
        <span class="label">Latitude</span>
        <p class="value">%LATITUDE%</p>
        <span class="label">Longitude</span>
        <p class="value">%LONGITUDE%</p>
      </div>

      <div class="button-row">
        <a class="button button-secondary" href="%GOOGLE_MAPS_URL%" target="_blank" rel="noopener noreferrer">View on Map</a>
        <a class="button button-primary" href="%APP_DEEP_LINK%">Open in App</a>
      </div>

      <p class="footer">If the app is installed, the link will open directly in the app. Otherwise, users can still view the business preview here.</p>
    </div>
  </div>
</body>
</html>
